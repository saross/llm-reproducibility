# Shared content registry (routing design §4, added 2026-07-24).
# Each canonical file's version and receipt token, and which agents consume it
# by which mechanism. Machine-verified by scripts/check-manifest-consistency.py
# (build item D5, wired into pre-commit): version lines and receipt tokens are
# diffed against the files; consumer lists are diffed against agent definitions
# and hook config; mirror consumers must contain the canonical file's fenced
# blocks and table rows byte-identically. Consumers with `status: planned`
# (artefact not yet authored) warn instead of fail; flip to active when built.
shared_content:
  fair-instrument:
    canonical_file: studies/open-science-compliance/protocol/instruments/fair-instrument.md
    version: "2.0"
    receipt_token: "3ddcbfd82575a2f8"
    status: frozen-by-osf-registration  # DOI 10.17605/OSF.IO/DQNHG; edits need regression gate + erratum + amendment
    consumers:
      - agent: fair-assessor-sonnet-5   # per-model variant (validation benchmark: Sonnet 5 + Opus 4.8)
        mechanism: push                 # SubagentStart injection, receipt required
      - agent: fair-assessor-opus-4-8
        mechanism: push
      - agent: research-assessor    # human/session lane
        mechanism: mirror           # normative blocks byte-identical; banner cites version + token
        mirror_file: extraction-system/prompts/06-infrastructure_pass6_prompt.md
  data-availability-taxonomy:
    canonical_file: studies/open-science-compliance/protocol/instruments/data-availability-taxonomy.md
    version: "1.0"
    receipt_token: "068d5f05793429d7"
    status: frozen-by-osf-registration  # prereg §7.3; L-levels assigned at reproduction time only
    consumers:
      - agent: reproduction-planner
        mechanism: push
  verdicts-and-precision:
    canonical_file: studies/open-science-compliance/protocol/instruments/verdicts-and-precision.md
    version: "1.0"
    receipt_token: "fe9bca3d3c95f931"
    status: frozen-by-osf-registration  # prereg §7.2/§7.4/§7.5 + reproduction protocol v1.1
    consumers:
      - agent: reproduction-executor
        mechanism: push
      - agent: reproduction-assessor  # human/session lane skill
        mechanism: mirror             # discrepancy/tolerance/scope tables byte-identical
        mirror_file: .claude/skills/reproduction-assessor/SKILL.md
  coverage-rules:
    canonical_file: studies/open-science-compliance/protocol/instruments/coverage-rules.md
    version: "1.0"
    receipt_token: "a2a4c0a899291c2b"
    status: frozen-by-osf-registration  # prereg §7.6; denominator lock
    consumers:
      - agent: reproduction-planner
        mechanism: push
      - agent: reproduction-executor
        mechanism: push
  eligibility-criteria:
    canonical_file: studies/open-science-compliance/protocol/instruments/eligibility-criteria.md
    version: "1.0"
    receipt_token: "8f88ae3af8e03284"
    status: frozen-by-osf-registration  # prereg §4–§5 incl. compute cap
    consumers:
      - agent: reproduction-planner
        mechanism: push
  pipeline-invariants:
    canonical_file: .claude/shared/invariants.md
    version: "1.0"
    receipt_token: "f847020d25d57382"
    status: frozen-by-osf-registration  # anchored in prereg §8; plan §4.3
    consumers:
      - agent: reproduction-planner
        mechanism: push
      - agent: reproduction-executor
        mechanism: push
      - agent: adversarial-reviewer
        mechanism: push
  adversarial-review-framework:
    canonical_file: .claude/skills/reproduction-assessor/references/adversarial-review-framework.md
    version: "1.1"
    receipt_token: "0f83c3181c5dbe00"
    status: governed-instrument  # not OSF-frozen; §8 regression gate applies (promoted pull→push, design §5)
    consumers:
      - agent: adversarial-reviewer
        mechanism: push

